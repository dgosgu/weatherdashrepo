<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Weather Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="top-row">
        <select id="locationSelect">
          <option value="Dorado" selected>Dorado</option>
          <option value="San Juan">San Juan</option>
          <option value="Rincon">Rincón</option>
          <option value="Fajardo">Fajardo</option>
          <option value="Midway, Utah">Midway, Utah</option>
        </select>

        <button id="favoriteBtn">☆</button>
      </div>

      <div class="weather-main">
        <h1 id="city">Dorado</h1>
        <button id="radarBtn">Radar</button>
        <h2 id="temp">--°F</h2>
      </div>

      <p id="wind">Wind: -- knots</p>
      <p id="desc">Loading...</p>
    </div>

    <div class="card placeholder-card">
    <h2>Coming Soon</h2>
    <p>Extra conditions tile</p>
    </div>

    <div class="map-card">
      <button id="resizeMapBtn">Expand</button>
      <div id="map"></div>
    </div>
  </div>

  <div class="side-meter left-meter" id="kiteMeter">
  <span>Kiteboarding</span>
  </div>

  <div class="side-meter right-meter" id="surfMeter">
    <span>Surfing</span>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
