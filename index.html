<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Weather Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="top-row">
        <select id="locationSelect">
          <optgroup label="North Coast / Dorado">
            <option value="GoodWinds">GoodWinds / Barlovento</option>
            <option value="Goyu">Goyu / TV Station</option>
            <option value="Ollo 13">Ollo 13 / Breñas</option>
            <option value="Vega Baja">Vega Baja</option>
          </optgroup>

          <optgroup label="San Juan / Isla Verde">
            <option value="Isla Verde">Isla Verde</option>
            <option value="Ocean Park">Ocean Park</option>
            <option value="Pine Grove">Pine Grove</option>
            <option value="Escambron">Escambrón</option>
          </optgroup>

          <optgroup label="East Coast">
            <option value="Luquillo">Luquillo</option>
            <option value="Fajardo">Fajardo</option>
            <option value="Seven Seas">Seven Seas</option>
          </optgroup>

          <optgroup label="West Coast">
            <option value="Rincon">Rincón</option>
            <option value="Domes">Domes</option>
            <option value="Maria's">Maria’s</option>
            <option value="Sandy Beach">Sandy Beach</option>
            <option value="Jobos">Jobos</option>
          </optgroup>

          <optgroup label="South">
            <option value="La Parguera">La Parguera</option>
          </optgroup>
        </select>
        <button id="favoriteBtn">☆</button>
      </div>

      <div class="weather-main">
        <h1 id="city">Dorado</h1>
        <h2 id="temp">--°F</h2>
      </div>

      <p id="wind">Wind: -- knots</p>
      <p id="desc">Loading...</p>
    </div>

    <div class="card placeholder-card">
    <h2>Map Options:</h2>
    <button id="windOverlayBtn">Wind</button>
    <button id="heatOverlayBtn">Heat</button>
    <button id="rainOverlayBtn">Rain</button>
    </div>

    <div class="map-card">
      <button id="resizeMapBtn">Expand</button>
      <div id="map"></div>
    </div>
  </div>

  <div class="side-meter left-meter" id="kiteMeter">
  <span>Kiteboarding</span>
  </div>

  <div class="side-meter right-meter" id="surfMeter">
    <span>Surfing</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
