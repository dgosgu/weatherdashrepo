<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Weather Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <div class="card">
      <h1 id="city">Loading...</h1>
      <h2 id="temp"></h2>
      <p id="wind"></p>
      <p id="desc"></p>
    </div>

    <div class="map-card">
      <iframe
        src="https://www.google.com/maps?q=Dorado,Puerto+Rico&output=embed"
        loading="lazy"
        allowfullscreen>
      </iframe>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
